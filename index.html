<!doctype html>
<html lang="ca">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RACC - Reaction Driver</title>
    <style>
      body { margin: 0; background: #222; overflow: hidden; font-family: Arial, sans-serif; }
      canvas { display: block; image-rendering: pixelated; }
      #ui-overlay {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        display: none; flex-direction: column; justify-content: center;
        align-items: center; background: rgba(0,0,0,0.85); color: white; z-index: 10;
      }
      .btn {
        padding: 15px 30px; margin: 10px; font-size: 20px; cursor: pointer;
        border: none; border-radius: 5px; font-weight: bold; transition: 0.3s;
      }
      #btn-retry { background: #27ae60; color: white; }
      #btn-exit { background: #c0392b; color: white; }
      .btn:hover { transform: scale(1.1); }
    </style>
  </head>
  <body>
    <div id="ui-overlay">
      <h1 id="status-title">NIVELL SUPERAT!</h1>
      <button id="btn-retry" class="btn">TORNAR A JUGAR</button>
      <button id="btn-exit" class="btn">SORTIR</button>
    </div>
    <canvas id="gameCanvas"></canvas>

    <script>
      const canvas = document.getElementById("gameCanvas");
      const ctx = canvas.getContext("2d");
      const overlay = document.getElementById("ui-overlay");
      const statusTitle = document.getElementById("status-title");

      // --- CONFIGURACIÓ ---
      const CAR_WIDTH = 160; const CAR_HEIGHT = 80;
      const TREE_WIDTH = 150; const TREE_HEIGHT = 180;
      const SIGN_WIDTH = 80; const SIGN_HEIGHT = 120;
      const LEVEL_DISTANCE = 60000; 

      // --- VARIABLES D'ESTAT ---
      let speed, MAX_SPEED, needleAngleSmooth, bgX, player, enemies, obstacles, signs, trafficLights, pedestrians, continuousLines, isGameOver, distanceCovered;
      let speedLimit = null;
      let stopTimer = 0; 

      function initGame() {
        speed = 2; MAX_SPEED = 20; needleAngleSmooth = Math.PI; bgX = 0; distanceCovered = 0;
        isGameOver = false; speedLimit = null; stopTimer = 0;
        player = { x: 150, y: canvas.height / 2 - CAR_HEIGHT / 2, width: CAR_WIDTH, height: CAR_HEIGHT };
        enemies = []; obstacles = []; signs = []; trafficLights = []; pedestrians = []; continuousLines = [];
        overlay.style.display = "none";
      }

      function resizeCanvas() {
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        if (!player) initGame();
        drawSpeedometerStatic();
      }
      window.addEventListener("resize", resizeCanvas);

      const bgImg = new Image(); bgImg.src = "images/fondo.png"; 
      const carImg = new Image(); carImg.src = "images/coche_transparente.png";
      const treeImg = new Image(); treeImg.src = "images/arbol.png";

      // --- GENERACIÓ ---
      setInterval(() => { if(!isGameOver && speed > 0.5) spawnEnemy(); }, 3500);
      setInterval(() => { if(!isGameOver && speed > 0.5) spawnObstacle(); }, 2500);
      setInterval(() => { if(!isGameOver) spawnTrafficLight(); }, 20000);
      setInterval(() => { if(!isGameOver && speed > 0.5) spawnSign(); }, 12000);
      setInterval(() => { if(!isGameOver && speed > 0.5) spawnContinuousLine(); }, 8000);

      function spawnEnemy() {
        const lane = Math.random() < 0.5 ? canvas.height/2 - 90 : canvas.height/2 + 30;
        enemies.push({ x: canvas.width + 300, y: lane, width: CAR_WIDTH, height: CAR_HEIGHT, speed: speed + 3 });
      }
      
      function spawnObstacle() {
        let yPos; const center = canvas.height / 2;
        yPos = Math.random() < 0.5 ? Math.random() * (center - 380) : (center + 320) + Math.random() * 100;
        obstacles.push({ x: canvas.width + 200, y: yPos, width: TREE_WIDTH, height: TREE_HEIGHT, img: treeImg });
      }

      function spawnTrafficLight() {
        const yPos = Math.random() < 0.5 ? (canvas.height / 2 - 380) : (canvas.height / 2 + 220);
        trafficLights.push({ x: canvas.width + 600, y: yPos, state: 'green', timer: 0, passed: false });
      }
      
      function spawnSign() {
        const limits = [5, 8, 12, 15]; const val = limits[Math.floor(Math.random() * limits.length)];
        const yPos = Math.random() < 0.5 ? (canvas.height / 2 - 360) : (canvas.height / 2 + 220);
        signs.push({ x: canvas.width + 400, y: yPos, limit: val, width: SIGN_WIDTH, height: SIGN_HEIGHT });
      }

      function spawnContinuousLine() {
        continuousLines.push({ x: canvas.width + 100, width: 1200 }); 
      }

      function update() {
        if (isGameOver) return;
        
        if (speed < 0.5) {
            stopTimer += 1/60; 
            if (stopTimer >= 5) endGame("¡OBSTRUCCIÓ DEL TRÀNSIT!");
        } else {
            stopTimer = 0;
        }

        distanceCovered += speed * 5;
        if (distanceCovered >= LEVEL_DISTANCE) { winGame(); return; }

        const roadTop = canvas.height / 2 - 180;
        const roadBottom = canvas.height / 2 + 170;
        let currentMaxSpeed = MAX_SPEED;
        let lateralSpeed = 7;

        if (player.y < roadTop || (player.y + player.height) > roadBottom) {
            currentMaxSpeed = 5; lateralSpeed = 4;    
            if (speed > currentMaxSpeed) speed -= 0.2;
        }

        let onContinuousLine = false;
        continuousLines.forEach(line => {
          line.x -= speed * 6;
          // Comprovem si el jugador està al centre de la carretera (on hi ha la línia)
          if (player.x + player.width > line.x && player.x < line.x + line.width) {
            // El centre de la carretera és a canvas.height/2
            if (Math.abs((player.y + player.height/2) - (canvas.height/2)) < 60) {
                onContinuousLine = true;
            }
          }
        });

        if (keys["ArrowUp"]) {
          if (onContinuousLine) endGame("¡LÍNIA CONTÍNUA!");
          player.y -= lateralSpeed;
        }
        if (keys["ArrowDown"]) {
          if (onContinuousLine) endGame("¡LÍNIA CONTÍNUA!");
          player.y += lateralSpeed;
        }
        
        if (keys["ArrowLeft"]) speed = Math.max(0, speed - 0.4);
        else if (keys["ArrowRight"]) speed = Math.min(currentMaxSpeed, speed + 0.15);
        
        bgX += speed * 6; if (bgX >= canvas.width) bgX = 0;
        player.y = Math.max(0, Math.min(canvas.height - player.height, player.y));

        continuousLines = continuousLines.filter(l => l.x + l.width > -100);

        trafficLights.forEach((tl, index) => {
          tl.x -= speed * 6; tl.timer++;
          if (tl.timer < 300) tl.state = 'green';
          else if (tl.timer < 450) tl.state = 'amber';
          else if (tl.timer < 1100) {
            tl.state = 'red';
            if (tl.timer === 451) pedestrians.push({ x: tl.x + 40, y: canvas.height/2 + 180, walkY: -2.5 });
          } else tl.timer = 0;
          if (tl.state === 'red' && player.x + player.width > tl.x && player.x < tl.x + 100 && !tl.passed) endGame("¡SEMÀFOR EN VERMELL!");
          if (player.x > tl.x + 100) tl.passed = true;
          if (tl.x < -600) trafficLights.splice(index, 1);
        });

        for (let i = pedestrians.length - 1; i >= 0; i--) {
            pedestrians[i].x -= speed * 6; pedestrians[i].y += pedestrians[i].walkY;
            if (checkCollision(player, { x: pedestrians[i].x, y: pedestrians[i].y, width: 30, height: 50 })) endGame("¡ATROPEL·LAMENT!");
            if (pedestrians[i].y < 0) pedestrians.splice(i, 1);
        }

        signs.forEach((s, i) => {
            s.x -= speed * 6;
            if (player.x > s.x && player.x < s.x + 60) speedLimit = s.limit;
        });

        if (speedLimit && speed > speedLimit + 0.5) endGame("¡EXCÉS DE VELOCITAT!");

        [enemies, obstacles].forEach(list => {
          for (let i = list.length - 1; i >= 0; i--) {
            list[i].x -= (speed * 6) + (list[i].speed || 0);
            if (checkCollision(player, list[i])) endGame("¡XOC!");
            if (list[i].x < -400) list.splice(i, 1);
          }
        });
      }

      function checkCollision(r1, r2) {
        if (!r2.x || !r2.width) return false;
        const marginX = r2.width * 0.15;
        const marginY = r2.height * 0.40;
        return r1.x < (r2.x + r2.width - marginX) && 
               (r1.x + r1.width) > (r2.x + marginX) && 
               r1.y < (r2.y + r2.height - marginY) && 
               (r1.y + r1.height) > (r2.y + marginY);
      }

      function winGame() { isGameOver = true; statusTitle.innerText = "NIVELL SUPERAT! 🎉"; statusTitle.style.color = "#2ecc71"; overlay.style.display = "flex"; }
      function endGame(reason) { isGameOver = true; statusTitle.innerText = reason; statusTitle.style.color = "#e74c3c"; overlay.style.display = "flex"; }

      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (bgImg.complete) {
          ctx.drawImage(bgImg, -bgX, 0, canvas.width, canvas.height);
          ctx.drawImage(bgImg, canvas.width - bgX, 0, canvas.width, canvas.height);
        }

        // Dibuixar la línia contínua al centre exacte de la carretera
        continuousLines.forEach(l => {
          ctx.fillStyle = "white";
          ctx.fillRect(l.x, canvas.height / 2 - 5, l.width, 10);
        });

        trafficLights.forEach(tl => {
          ctx.fillStyle = "rgba(255, 255, 255, 0.7)";
          for (let i = 0; i < 7; i++) ctx.fillRect(tl.x, (canvas.height/2-150) + (i*50), 120, 20);
          ctx.fillStyle = "#333"; ctx.fillRect(tl.x + 120, tl.y, 45, 110);
          ctx.fillStyle = (tl.state === 'red') ? "#f00" : "#300"; ctx.beginPath(); ctx.arc(tl.x+142, tl.y+25, 14, 0, 7); ctx.fill();
          ctx.fillStyle = (tl.state === 'amber') ? "#fa0" : "#320"; ctx.beginPath(); ctx.arc(tl.x+142, tl.y+55, 14, 0, 7); ctx.fill();
          ctx.fillStyle = (tl.state === 'green') ? "#0f0" : "#030"; ctx.beginPath(); ctx.arc(tl.x+142, tl.y+85, 14, 0, 7); ctx.fill();
        });

        pedestrians.forEach(p => { ctx.fillStyle = "#3498db"; ctx.fillRect(p.x, p.y, 25, 40); });
        signs.forEach(s => {
          ctx.fillStyle = "#555"; ctx.fillRect(s.x + 35, s.y + 40, 10, 80);
          ctx.fillStyle = "white"; ctx.beginPath(); ctx.arc(s.x + 40, s.y + 40, 40, 0, 7); ctx.fill();
          ctx.strokeStyle = "red"; ctx.lineWidth = 8; ctx.stroke();
          ctx.fillStyle = "black"; ctx.font = "bold 30px Arial"; ctx.textAlign = "center"; ctx.fillText(s.limit * 10, s.x + 40, s.y + 50);
        });

        obstacles.forEach(o => { if (o.img.complete) ctx.drawImage(o.img, o.x, o.y, o.width, o.height); });
        enemies.forEach(e => ctx.drawImage(carImg, e.x, e.y, e.width, e.height));
        ctx.drawImage(carImg, player.x, player.y, player.width, player.height);

        if (speedLimit) {
            ctx.fillStyle = "white"; ctx.beginPath(); ctx.arc(60, 60, 40, 0, 7); ctx.fill();
            ctx.strokeStyle = (speed > speedLimit + 0.5 && Math.floor(Date.now()/200)%2==0) ? "yellow" : "red";
            ctx.lineWidth = 6; ctx.stroke();
            ctx.fillStyle = "black"; ctx.font = "bold 28px Arial"; ctx.textAlign = "center"; ctx.fillText(speedLimit * 10, 60, 70);
        }

        const barW = 400, barX = canvas.width/2 - 200, progress = distanceCovered/LEVEL_DISTANCE;
        ctx.fillStyle = "rgba(0,0,0,0.5)"; ctx.fillRect(barX - 5, 25, barW + 10, 30);
        ctx.fillStyle = "#3498db"; ctx.fillRect(barX, 30, barW * Math.min(1, progress), 20);
        ctx.strokeStyle = "white"; ctx.strokeRect(barX, 30, barW, 20);
        ctx.fillStyle = "white"; ctx.font = "bold 18px Arial"; ctx.textAlign = "center"; ctx.fillText(Math.floor(progress * 100) + "%", canvas.width/2, 47);

        const vX = 150, vY = canvas.height - 50;
        ctx.drawImage(speedoCanvas, 0, canvas.height - 230);
        const targetAngle = Math.PI + (speed / 20) * Math.PI;
        needleAngleSmooth += (targetAngle - needleAngleSmooth) * 0.1;
        ctx.strokeStyle = "red"; ctx.lineWidth = 4; ctx.beginPath(); ctx.moveTo(vX, vY);
        ctx.lineTo(vX + Math.cos(needleAngleSmooth)*80, vY + Math.sin(needleAngleSmooth)*80); ctx.stroke();
        ctx.fillStyle = "white"; ctx.font = "bold 24px Arial"; ctx.textAlign = "center"; ctx.fillText(`${Math.floor(speed * 10)} km/h`, vX, vY + 35);

        if (stopTimer > 2) {
            ctx.fillStyle = "yellow"; ctx.font = "bold 20px Arial"; ctx.textAlign = "center";
            ctx.fillText(`MOU-TE! ${Math.ceil(5 - stopTimer)}s`, vX, vY - 140);
        }
      }

      const speedoCanvas = document.createElement("canvas");
      const speedoCtx = speedoCanvas.getContext("2d");
      speedoCanvas.width = 300; speedoCanvas.height = 200;
      function drawSpeedometerStatic() {
        const c = speedoCtx; c.clearRect(0,0,300,200);
        c.beginPath(); c.lineWidth = 6; c.strokeStyle = "white"; c.arc(150, 180, 100, Math.PI, 2 * Math.PI); c.stroke();
        for (let i = 0; i <= 20; i += 2) {
          const a = Math.PI + (i / 20) * Math.PI;
          c.fillStyle = "white"; c.font = "bold 14px Arial"; c.textAlign = "center";
          c.fillText(i * 10, 150 + Math.cos(a)*70, 180 + Math.sin(a)*70 + 5);
        }
      }

      document.getElementById("btn-retry").onclick = initGame;
      document.getElementById("btn-exit").onclick = () => window.location.reload();
      const keys = {};
      document.addEventListener("keydown", (e) => keys[e.key] = true);
      document.addEventListener("keyup", (e) => keys[e.key] = false);
      function loop() { update(); draw(); requestAnimationFrame(loop); }
      initGame(); resizeCanvas(); loop();
    </script>
  </body>
</html>
