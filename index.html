<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RACC-Reaction Driver</title>
    <style>
      body { margin: 0; background: #222; overflow: hidden; }
      canvas { display: block; image-rendering: pixelated; }
    </style>
  </head>
  <body>
    <canvas id="gameCanvas"></canvas>

    <script>
      const canvas = document.getElementById("gameCanvas");
      const ctx = canvas.getContext("2d");

      const CAR_WIDTH = 110;
      const CAR_HEIGHT = 100;

      function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        prepareBackground();
        player.y = canvas.height / 2 - CAR_HEIGHT / 2;
        drawSpeedometerStatic();
      }
      window.addEventListener("resize", resizeCanvas);

      // --- IMÁGENES ---
      const bgImg = new Image();
      bgImg.src = "images/fondo.png"; 
      let bgReady = false;
      bgImg.onload = () => { bgReady = true; prepareBackground(); };

      const carImg = new Image();
      carImg.src = "images/coche_transparente.png";
      const enemyImg = new Image();
      enemyImg.src = "images/coche_enemigo.png";

      // --- FONDO ---
      const bgCanvas = document.createElement("canvas");
      const bgCtx = bgCanvas.getContext("2d");

      function prepareBackground() {
        bgCanvas.width = canvas.width;
        bgCanvas.height = canvas.height;
        
        if (bgReady) {
          bgCtx.drawImage(bgImg, 0, 0, bgCanvas.width, bgCanvas.height);
        } else {
          // Césped (Verde)
          bgCtx.fillStyle = "#2d5a27"; 
          bgCtx.fillRect(0, 0, bgCanvas.width, bgCanvas.height);
          
          // Asfalto (Gris) - Centrado
          bgCtx.fillStyle = "#444"; 
          const roadH = 350; // Carretera un poco más ancha
          bgCtx.fillRect(0, canvas.height/2 - roadH/2, bgCanvas.width, roadH);
          
          // Línea central
          bgCtx.strokeStyle = "#fff";
          bgCtx.setLineDash([30, 30]);
          bgCtx.lineWidth = 4;
          bgCtx.beginPath();
          bgCtx.moveTo(0, canvas.height/2);
          bgCtx.lineTo(bgCanvas.width, canvas.height/2);
          bgCtx.stroke();
        }
      }

      // --- LÓGICA ---
      let speed = 2; 
      const MAX_SPEED = 20; 
      let needleAngleSmooth = Math.PI;
      let bgX = 0;

      const player = { x: 100, y: 300, width: CAR_WIDTH, height: CAR_HEIGHT };
      const enemies = [];

      function spawnEnemy() {
        if (enemies.length >= 6) return;
        // Enemigos dentro de la carretera
        const lane = Math.random() < 0.5 ? canvas.height/2 - 120 : canvas.height/2 + 40;
        enemies.push({
          x: canvas.width + 200,
          y: lane,
          width: CAR_WIDTH,
          height: CAR_HEIGHT,
          speed: speed + Math.random() * 5 + 3
        });
      }
      setInterval(spawnEnemy, 1500);

      // --- VELOCÍMETRO ESTÁTICO ---
      const speedoCanvas = document.createElement("canvas");
      const speedoCtx = speedoCanvas.getContext("2d");
      speedoCanvas.width = 300;
      speedoCanvas.height = 200;

      function drawSpeedometerStatic() {
        const c = speedoCtx;
        const centerX = 150;
        const centerY = 180;
        const radius = 100;
        c.clearRect(0, 0, speedoCanvas.width, speedoCanvas.height);
        
        const gradient = c.createRadialGradient(centerX, centerY, 20, centerX, centerY, radius + 40);
        gradient.addColorStop(0, "rgba(255,255,255,0.15)");
        gradient.addColorStop(1, "rgba(255,255,255,0)");
        c.fillStyle = gradient;
        c.beginPath();
        c.arc(centerX, centerY, radius + 40, Math.PI, 2 * Math.PI);
        c.fill();

        c.beginPath();
        c.lineWidth = 6;
        c.strokeStyle = "#ffffff";
        c.arc(centerX, centerY, radius, Math.PI, 2 * Math.PI);
        c.stroke();

        for (let i = 0; i <= MAX_SPEED; i += 2) {
          const angle = Math.PI + (i / MAX_SPEED) * Math.PI;
          c.strokeStyle = "white";
          c.beginPath();
          c.moveTo(centerX + Math.cos(angle)*92, centerY + Math.sin(angle)*92);
          c.lineTo(centerX + Math.cos(angle)*100, centerY + Math.sin(angle)*100);
          c.stroke();
          
          c.fillStyle = "white";
          c.font = "bold 14px Arial";
          c.textAlign = "center";
          c.fillText(i * 10, centerX + Math.cos(angle)*70, centerY + Math.sin(angle)*70 + 5);
        }
      }

      function update() {
        // --- DETECCIÓN DE CÉSPED CORREGIDA ---
        // La carretera mide 350px y está centrada.
        const roadTop = canvas.height / 2 - 175;
        const roadBottom = canvas.height / 2 + 175;
        
        // Verificamos si el centro del coche se sale del asfalto
        const playerCenterY = player.y + player.height / 2;

        if (playerCenterY < roadTop || playerCenterY > roadBottom) {
            speed = Math.max(1.5, speed - 0.05); // Frenado mucho más suave
            player.y += Math.sin(Date.now() * 0.5) * 1.5; // Vibración sutil
        } else {
            speed += 0.008; // Aceleración un poco más rápida en asfalto
        }

        bgX += speed * 4;
        if (bgX >= canvas.width) bgX = 0;

        // Movimiento
        if (keys["ArrowUp"]) player.y -= 7;
        if (keys["ArrowDown"]) player.y += 7;
        if (keys["ArrowLeft"]) speed = Math.max(1, speed - 0.2);
        if (keys["ArrowRight"]) speed = Math.min(MAX_SPEED, speed + 0.15);

        speed = Math.min(speed, MAX_SPEED);

        // Límites de pantalla
        if (player.y < 0) player.y = 0;
        if (player.y + player.height > canvas.height) player.y = canvas.height - player.height;

        // Enemigos
        for (let i = enemies.length - 1; i >= 0; i--) {
          enemies[i].x -= enemies[i].speed;
          if (enemies[i].x + enemies[i].width < -200) enemies.splice(i, 1);
        }
      }

      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Dibujo del fondo
        ctx.drawImage(bgCanvas, -bgX, 0);
        ctx.drawImage(bgCanvas, canvas.width - bgX, 0);

        // Jugador
        if (carImg.complete && carImg.naturalWidth !== 0) {
          ctx.drawImage(carImg, player.x, player.y, player.width, player.height);
        } else {
          ctx.fillStyle = "#00f0ff";
          ctx.fillRect(player.x, player.y, player.width, player.height);
        }

        // Enemigos
        enemies.forEach(e => {
          if (enemyImg.complete && enemyImg.naturalWidth !== 0) {
            ctx.drawImage(enemyImg, e.x, e.y, e.width, e.height);
          } else {
            ctx.fillStyle = "#ff4444";
            ctx.fillRect(e.x, e.y, e.width, e.height);
          }
        });

        // Velocímetro
        const centerX = 150;
        const centerY = canvas.height - 130; 
        ctx.drawImage(speedoCanvas, 0, canvas.height - 310);
        
        const targetAngle = Math.PI + (speed / MAX_SPEED) * Math.PI;
        needleAngleSmooth += (targetAngle - needleAngleSmooth) * 0.1;

        ctx.strokeStyle = "red";
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.moveTo(centerX, centerY);
        ctx.lineTo(centerX + Math.cos(needleAngleSmooth)*80, centerY + Math.sin(needleAngleSmooth)*80);
        ctx.stroke();

        ctx.fillStyle = "white";
        ctx.font = "bold 24px Arial";
        ctx.textAlign = "center";
        ctx.fillText(`${Math.floor(speed * 10)} km/h`, centerX, centerY + 35);
      }

      const keys = {};
      document.addEventListener("keydown", (e) => keys[e.key] = true);
      document.addEventListener("keyup", (e) => keys[e.key] = false);

      function loop() {
        update();
        draw();
        requestAnimationFrame(loop);
      }

      resizeCanvas();
      loop();
    </script>
  </body>
</html>
