<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RACC-Reaction Driver</title>
    <style>
      body { margin: 0; background: #222; overflow: hidden; }
      canvas { display: block; image-rendering: pixelated; }
    </style>
  </head>
  <body>
    <canvas id="gameCanvas"></canvas>

    <script>
      const canvas = document.getElementById("gameCanvas");
      const ctx = canvas.getContext("2d");

      // Tamaños de elementos
      const CAR_WIDTH = 160; 
      const CAR_HEIGHT = 80;
      const TREE_WIDTH = 150;
      const TREE_HEIGHT = 180;
      const CONE_WIDTH = 60;
      const CONE_HEIGHT = 70;

      function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        player.y = canvas.height / 2 - CAR_HEIGHT / 2;
        drawSpeedometerStatic();
      }
      window.addEventListener("resize", resizeCanvas);

      // --- IMÁGENES ---
      const bgImg = new Image(); 
      bgImg.src = "images/fondo.png"; // Usando tu imagen de fondo
      
      const carImg = new Image(); 
      carImg.src = "images/coche_transparente.png";
      
      const treeImg = new Image(); 
      treeImg.src = "images/arbol.png";
      
      const coneImg = new Image(); 
      coneImg.src = "images/cono.png";

      // --- LÓGICA DE JUEGO ---
      let speed = 2; 
      const MAX_SPEED = 20; 
      let needleAngleSmooth = Math.PI;
      let bgX = 0;

      const player = { x: 100, y: 300, width: CAR_WIDTH, height: CAR_HEIGHT };
      const enemies = [];
      const obstacles = [];

      function spawnEnemy() {
        if (enemies.length >= 4) return;
        const lane = Math.random() < 0.5 ? canvas.height/2 - 140 : canvas.height/2 + 50;
        enemies.push({ x: canvas.width + 300, y: lane, width: CAR_WIDTH, height: CAR_HEIGHT, speed: speed + 4 });
      }

      function spawnObstacle() {
        if (obstacles.length >= 10) return;
        const isTree = Math.random() < 0.6;
        let yPos;
        if (isTree) {
          yPos = Math.random() < 0.7 ? Math.random() * (canvas.height/2 - 250) : canvas.height - 200;
        } else {
          yPos = Math.random() < 0.5 ? canvas.height/2 - 225 : canvas.height/2 + 160;
        }
        obstacles.push({ x: canvas.width + 200, y: yPos, width: isTree ? TREE_WIDTH : CONE_WIDTH, height: isTree ? TREE_HEIGHT : CONE_HEIGHT, img: isTree ? treeImg : coneImg });
      }

      setInterval(spawnEnemy, 2500);
      setInterval(spawnObstacle, 1500);

      // --- VELOCÍMETRO (ESTÁTICO) ---
      const speedoCanvas = document.createElement("canvas");
      const speedoCtx = speedoCanvas.getContext("2d");
      speedoCanvas.width = 300; speedoCanvas.height = 200;

      function drawSpeedometerStatic() {
        const c = speedoCtx;
        const centerX = 150;
        const centerY = 180;
        const radius = 100;
        c.clearRect(0, 0, speedoCanvas.width, speedoCanvas.height);
        c.beginPath();
        c.lineWidth = 6;
        c.strokeStyle = "#ffffff";
        c.arc(centerX, centerY, radius, Math.PI, 2 * Math.PI);
        c.stroke();

        for (let i = 0; i <= MAX_SPEED; i += 2) {
          const angle = Math.PI + (i / MAX_SPEED) * Math.PI;
          c.strokeStyle = "white";
          c.beginPath();
          c.moveTo(centerX + Math.cos(angle)*92, centerY + Math.sin(angle)*92);
          c.lineTo(centerX + Math.cos(angle)*100, centerY + Math.sin(angle)*100);
          c.stroke();
          c.fillStyle = "white";
          c.font = "bold 14px Arial";
          c.textAlign = "center";
          c.fillText(i * 10, centerX + Math.cos(angle)*70, centerY + Math.sin(angle)*70 + 5);
        }
      }

      function checkCollision(r1, r2) {
        return r1.x < r2.x + r2.width * 0.8 &&
               r1.x + r1.width * 0.8 > r2.x &&
               r1.y < r2.y + r2.height * 0.8 &&
               r1.y + r1.height * 0.8 > r2.y;
      }

      function update() {
        // Asumiendo que en fondo.png la carretera está en el centro (aprox 400px de ancho)
        const roadTop = canvas.height / 2 - 200;
        const roadBottom = canvas.height / 2 + 200;
        const playerCenterY = player.y + player.height / 2;

        if (playerCenterY < roadTop || playerCenterY > roadBottom) {
            speed = Math.max(1.5, speed - 0.05);
            player.y += Math.sin(Date.now() * 0.5) * 1.5;
        } else {
            speed += 0.008; 
        }

        bgX += speed * 5;
        if (bgX >= canvas.width) bgX = 0;

        if (keys["ArrowUp"]) player.y -= 8;
        if (keys["ArrowDown"]) player.y += 8;
        if (keys["ArrowLeft"]) speed = Math.max(1, speed - 0.2);
        if (keys["ArrowRight"]) speed = Math.min(MAX_SPEED, speed + 0.15);

        speed = Math.min(speed, MAX_SPEED);

        [enemies, obstacles].forEach(list => {
          for (let i = list.length - 1; i >= 0; i--) {
            list[i].x -= speed + (list[i].speed || 0);
            if (checkCollision(player, list[i])) {
              speed = 1.5;
              list.splice(i, 1);
              continue;
            }
            if (list[i].x < -300) list.splice(i, 1);
          }
        });
      }

      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Fondo con imagen fondo.png
        if (bgImg.complete) {
          ctx.drawImage(bgImg, -bgX, 0, canvas.width, canvas.height);
          ctx.drawImage(bgImg, canvas.width - bgX, 0, canvas.width, canvas.height);
        }

        // Jugador y Enemigos
        ctx.drawImage(carImg, player.x, player.y, player.width, player.height);
        enemies.forEach(e => ctx.drawImage(carImg, e.x, e.y, e.width, e.height));

        // Obstáculos
        obstacles.forEach(o => {
          if (o.img.complete) ctx.drawImage(o.img, o.x, o.y, o.width, o.height);
        });

        // Velocímetro
        const centerX = 150;
        const centerY = canvas.height - 130; 
        ctx.drawImage(speedoCanvas, 0, canvas.height - 310);
        
        const targetAngle = Math.PI + (speed / MAX_SPEED) * Math.PI;
        needleAngleSmooth += (targetAngle - needleAngleSmooth) * 0.1;

        ctx.strokeStyle = "red";
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.moveTo(centerX, centerY);
        ctx.lineTo(centerX + Math.cos(needleAngleSmooth)*80, centerY + Math.sin(needleAngleSmooth)*80);
        ctx.stroke();

        ctx.fillStyle = "white";
        ctx.font = "bold 24px Arial";
        ctx.textAlign = "center";
        ctx.fillText(`${Math.floor(speed * 10)} km/h`, centerX, centerY + 35);
      }

      const keys = {};
      document.addEventListener("keydown", (e) => keys[e.key] = true);
      document.addEventListener("keyup", (e) => keys[e.key] = false);

      function loop() { update(); draw(); requestAnimationFrame(loop); }
      resizeCanvas(); loop();
    </script>
  </body>
</html>
