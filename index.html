<!doctype html>
<html lang="ca">
<head>
    <meta charset="UTF-8" />
    <title>RACC - Deluxe Reality Check</title>
    <style>
        body { margin: 0; background: #222; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        canvas { display: block; background: #333; }
        #ui-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: none; flex-direction: column; justify-content: center;
            align-items: center; background: rgba(0,0,0,0.9); color: white; z-index: 100;
        }
        .btn { padding: 15px 30px; font-size: 20px; cursor: pointer; border-radius: 8px; border: none; background: #27ae60; color: white; font-weight: bold; }
        #error-msg { position: absolute; bottom: 10px; left: 10px; color: #ff4757; font-size: 12px; z-index: 200; }
    </style>
</head>
<body>
    <div id="error-msg"></div>
    <div id="ui-overlay">
        <h1 id="status-title">NIVELL SUPERAT!</h1>
        <button onclick="initGame()" class="btn">TORNAR A JUGAR</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const errorDiv = document.getElementById("error-msg");

        // --- GESTIÓ D'IMATGES ---
        const img = {
            bg: new Image(),
            player: new Image(),
            enemy: new Image(),
            tree: new Image()
        };
        
        img.bg.src = "images/fondo.png";
        img.player.src = "images/coche_azul_transparente.png";
        img.enemy.src = "images/coche_transparente.png";
        img.tree.src = "images/arbol.png";

        // Verificar si les imatges fallen
        Object.keys(img).forEach(key => {
            img[key].onerror = () => {
                errorDiv.innerHTML += `⚠️ Error: No es troba "${img[key].src}"<br>`;
            };
        });

        let s = {
            speed: 2, dist: 0, bgX: 0, py: 300, 
            enemies: [], obstacles: [], keys: {},
            over: false, spawnTimer: 0, needleAng: Math.PI
        };

        function initGame() {
            s.speed = 3; s.dist = 0; s.over = false;
            s.py = canvas.height / 2;
            s.enemies = []; s.obstacles = [];
            s.spawnTimer = 0;
            document.getElementById("ui-overlay").style.display = "none";
        }

        window.onkeydown = (e) => s.keys[e.code] = true;
        window.onkeyup = (e) => s.keys[e.code] = false;

        function update() {
            if (s.over) return;

            // Moviment i Distància
            s.dist += s.speed * 5;
            if (s.dist >= 100000) {
                s.over = true;
                document.getElementById("status-title").innerText = "NIVELL SUPERAT! 🎉";
                document.getElementById("ui-overlay").style.display = "flex";
            }

            // Controls
            if (s.keys["ArrowUp"]) s.py -= 7;
            if (s.keys["ArrowDown"]) s.py += 7;
            if (s.keys["ArrowLeft"]) s.speed = Math.max(1, s.speed - 0.2);
            if (s.keys["ArrowRight"]) s.speed = Math.min(20, s.speed + 0.1);

            s.bgX = (s.bgX + s.speed * 6) % canvas.width;
            s.py = Math.max(80, Math.min(canvas.height - 180, s.py));

            // Generar cotxes enemics
            s.spawnTimer++;
            if (s.spawnTimer > 100) {
                s.enemies.push({ x: canvas.width + 200, y: 150 + Math.random() * (canvas.height - 300), w: 190, h: 100 });
                s.spawnTimer = 0;
            }

            // Lògica d'enemics
            s.enemies = s.enemies.filter(e => {
                e.x -= (s.speed * 6) + 3;
                // Col·lisió ajustada
                if (150 < e.x + 160 && 150 + 160 > e.x && s.py < e.y + 75 && s.py + 75 > e.y) {
                    s.over = true;
                    document.getElementById("status-title").innerText = "¡HAS XOCAT! 💥";
                    document.getElementById("ui-overlay").style.display = "flex";
                }
                return e.x > -400;
            });
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 1. DIBUIXAR ASFALT / FONDO
            if (img.bg.complete && img.bg.width > 0) {
                ctx.drawImage(img.bg, -s.bgX, 0, canvas.width, canvas.height);
                ctx.drawImage(img.bg, canvas.width - s.bgX, 0, canvas.width, canvas.height);
            } else {
                ctx.fillStyle = "#444"; ctx.fillRect(0,0,canvas.width,canvas.height);
                ctx.fillStyle = "#555"; ctx.fillRect(0, canvas.height/2-200, canvas.width, 400);
            }

            // 2. DIBUIXAR ENEMICS (Sense quadrats rojos!)
            s.enemies.forEach(e => {
                if (img.enemy.complete && img.enemy.width > 0) {
                    ctx.drawImage(img.enemy, e.x, e.y, e.w, e.h);
                }
            });
            
            // 3. JUGADOR
            if (img.player.complete && img.player.width > 0) {
                ctx.drawImage(img.player, 150, s.py, 190, 100);
            }

            // 4. UI: BARRA DE PROGRÉS (Dalt al centre)
            const barW = 400, barX = canvas.width/2 - 200;
            ctx.fillStyle = "rgba(0,0,0,0.6)"; ctx.fillRect(barX, 20, barW, 40);
            ctx.fillStyle = "#3498db"; ctx.fillRect(barX + 5, 25, (barW - 10) * (s.dist/100000), 30);
            ctx.fillStyle = "white"; ctx.font = "bold 16px Arial"; ctx.textAlign = "center";
            ctx.fillText(`${Math.floor((s.dist/100000)*100)}% COMPLETAT`, canvas.width/2, 45);

            // 5. UI: VELOCÍMETRE ANALÒGIC (Baix esquerra)
            const vX = 140, vY = canvas.height - 80;
            // Arc blanc
            ctx.strokeStyle = "white"; ctx.lineWidth = 4; ctx.beginPath();
            ctx.arc(vX, vY, 80, Math.PI, 2*Math.PI); ctx.stroke();
            // Agulla roja
            let targetAng = Math.PI + (s.speed/20)*Math.PI;
            s.needleAng += (targetAng - s.needleAng) * 0.1;
            ctx.strokeStyle = "#ff4757"; ctx.lineWidth = 5; ctx.beginPath();
            ctx.moveTo(vX, vY); ctx.lineTo(vX + Math.cos(s.needleAng)*70, vY + Math.sin(s.needleAng)*70);
            ctx.stroke();
            // Text Digital
            ctx.fillStyle = "white"; ctx.font = "bold 22px Monospace";
            ctx.fillText(`${Math.floor(s.speed*10)} km/h`, vX, vY + 40);
        }

        function loop() {
            update(); draw();
            requestAnimationFrame(loop);
        }

        window.onload = () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            initGame(); loop();
        };

        window.onresize = () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        };
    </script>
</body>
</html>
