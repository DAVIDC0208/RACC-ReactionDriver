<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RACC-Reaction Driver</title>
    <style>
      body {
        margin: 0;
        background: #222;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }
      canvas {
        border: 3px solid white;
        image-rendering: pixelated;
      }
    </style>
  </head>
  <body>
    <canvas id="gameCanvas" width="480" height="320"></canvas>
    <script>
      const canvas = document.getElementById("gameCanvas");
      const ctx = canvas.getContext("2d");
      const bgImg = new Image();
      bgImg.src = "/images/fondo.png";
      let bgX = 0;
      let speed = 2;
      const carImg = new Image();
      carImg.src = "/images/coche_transparente.png";
      const player = {
        x: 100,
        y: canvas.height / 2 - 16,
        width: 64,
        height: 32,
      };
      const keys = {};
      document.addEventListener("keydown", (e) => (keys[e.key] = true));
      document.addEventListener("keyup", (e) => (keys[e.key] = false));
      function update() {
        bgX += speed;
        if (bgX >= canvas.width) bgX = 0;
        if (keys["ArrowUp"]) player.y -= 4;
        if (keys["ArrowDown"]) player.y += 4;
        if (player.y < 0) player.y = 0;
        if (player.y + player.height > canvas.height)
          player.y = canvas.height - player.height;
      }
      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(bgImg, -bgX, 0, canvas.width, canvas.height);
        ctx.drawImage(
          bgImg,
          canvas.width - bgX,
          0,
          canvas.width,
          canvas.height,
        );
        ctx.drawImage(carImg, player.x, player.y, player.width, player.height);
      }
      function loop() {
        update();
        draw();
        requestAnimationFrame(loop);
      }
      loop();
    </script>
  </body>
</html>
